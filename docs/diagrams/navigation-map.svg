<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#000" />
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#FFFFFF"/>

  <!-- Auth -->
  <rect x="60" y="60" width="160" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="140" y="92" font-family="Arial" font-size="14" text-anchor="middle">Login</text>

  <rect x="60" y="130" width="160" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="140" y="162" font-family="Arial" font-size="14" text-anchor="middle">Register</text>

  <rect x="260" y="60" width="180" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="350" y="92" font-family="Arial" font-size="14" text-anchor="middle">EULA</text>

  <!-- Student Tabs -->
  <rect x="260" y="200" width="120" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="320" y="232" font-family="Arial" font-size="12" text-anchor="middle">Home</text>

  <rect x="400" y="200" width="120" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="460" y="232" font-family="Arial" font-size="12" text-anchor="middle">Schedule</text>

  <rect x="540" y="200" width="120" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="600" y="232" font-family="Arial" font-size="12" text-anchor="middle">Planner</text>

  <rect x="680" y="200" width="120" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="740" y="232" font-family="Arial" font-size="12" text-anchor="middle">Add Task</text>

  <rect x="820" y="200" width="120" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="880" y="232" font-family="Arial" font-size="12" text-anchor="middle">Tasks</text>

  <rect x="960" y="200" width="120" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="1020" y="232" font-family="Arial" font-size="12" text-anchor="middle">Profile</text>

  <!-- Admin Stack -->
  <rect x="880" y="340" width="220" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="990" y="372" font-family="Arial" font-size="12" text-anchor="middle">Admin Home</text>

  <rect x="880" y="410" width="220" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="990" y="442" font-family="Arial" font-size="12" text-anchor="middle">Create Schedule</text>

  <rect x="880" y="480" width="220" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="990" y="512" font-family="Arial" font-size="12" text-anchor="middle">View Schedules</text>

  <rect x="880" y="550" width="220" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="990" y="582" font-family="Arial" font-size="12" text-anchor="middle">Students</text>

  <rect x="880" y="620" width="220" height="50" rx="10" ry="10" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="990" y="652" font-family="Arial" font-size="12" text-anchor="middle">Announcements</text>

  <!-- Connectors -->
  <line x1="220" y1="85" x2="260" y2="85" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="155" x2="260" y2="85" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="350" y1="110" x2="320" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="110" x2="990" y2="340" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Admin stack chain -->
  <line x1="990" y1="390" x2="990" y2="410" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="990" y1="460" x2="990" y2="480" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="990" y1="530" x2="990" y2="550" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="990" y1="600" x2="990" y2="620" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
