<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#000" />
    </marker>
  </defs>
  <rect width="1200" height="500" fill="#FFFFFF"/>

  <!-- Actors -->
  <rect x="60" y="80" width="160" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="140" y="115" font-family="Arial" font-size="14" text-anchor="middle">Student</text>

  <rect x="60" y="180" width="160" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="140" y="215" font-family="Arial" font-size="14" text-anchor="middle">Admin</text>

  <!-- App -->
  <rect x="300" y="120" width="260" height="100" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="430" y="170" font-family="Arial" font-size="14" text-anchor="middle">Mobile App</text>
  <text x="430" y="190" font-family="Arial" font-size="12" text-anchor="middle">(Expo React Native)</text>

  <!-- Services -->
  <rect x="640" y="40" width="220" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="75" font-family="Arial" font-size="12" text-anchor="middle">Firebase Auth</text>

  <rect x="640" y="120" width="220" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="155" font-family="Arial" font-size="12" text-anchor="middle">Firestore Database</text>

  <rect x="640" y="200" width="220" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="235" font-family="Arial" font-size="12" text-anchor="middle">AsyncStorage Cache</text>

  <rect x="640" y="280" width="220" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="315" font-family="Arial" font-size="12" text-anchor="middle">Expo Notifications</text>

  <rect x="640" y="360" width="220" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="395" font-family="Arial" font-size="12" text-anchor="middle">Android AppUsageModule</text>

  <!-- Connectors -->
  <line x1="220" y1="110" x2="300" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="210" x2="300" y2="190" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="560" y1="150" x2="640" y2="70" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="160" x2="640" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="170" x2="640" y2="230" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="180" x2="640" y2="310" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="190" x2="640" y2="390" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
