<svg width="1000" height="1500" viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#000" />
    </marker>
  </defs>
  <rect width="1000" height="1500" fill="#FFFFFF"/>

  <!-- Nodes -->
  <rect x="340" y="40" width="320" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="500" y="75" font-family="Arial" font-size="16" text-anchor="middle">App Launch</text>

  <rect x="340" y="130" width="320" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="500" y="160" font-family="Arial" font-size="14" text-anchor="middle">Startup Checks</text>
  <text x="500" y="178" font-family="Arial" font-size="12" text-anchor="middle">(OTA Update Scan + Auth State)</text>

  <polygon points="500,220 620,280 500,340 380,280" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="500" y="285" font-family="Arial" font-size="14" text-anchor="middle">Authenticated?</text>

  <rect x="90" y="350" width="260" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="220" y="385" font-family="Arial" font-size="14" text-anchor="middle">Login / Register</text>

  <polygon points="500,390 620,450 500,510 380,450" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="500" y="455" font-family="Arial" font-size="14" text-anchor="middle">EULA Accepted?</text>

  <rect x="340" y="540" width="320" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="500" y="575" font-family="Arial" font-size="14" text-anchor="middle">Load User Profile + Role</text>

  <polygon points="500,610 620,670 500,730 380,670" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="500" y="675" font-family="Arial" font-size="14" text-anchor="middle">Role?</text>

  <rect x="120" y="740" width="260" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="250" y="775" font-family="Arial" font-size="14" text-anchor="middle">Admin Dashboard</text>

  <rect x="120" y="820" width="260" height="70" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="250" y="850" font-family="Arial" font-size="12" text-anchor="middle">Manage Schedules,</text>
  <text x="250" y="868" font-family="Arial" font-size="12" text-anchor="middle">Announcements, Students</text>

  <rect x="620" y="740" width="260" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="775" font-family="Arial" font-size="14" text-anchor="middle">Student Dashboard</text>

  <polygon points="750,820 870,880 750,940 630,880" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="750" y="885" font-family="Arial" font-size="14" text-anchor="middle">Online?</text>

  <rect x="510" y="950" width="280" height="70" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="650" y="980" font-family="Arial" font-size="12" text-anchor="middle">Sync Schedule, Tasks,</text>
  <text x="650" y="998" font-family="Arial" font-size="12" text-anchor="middle">Announcements</text>

  <rect x="710" y="950" width="280" height="70" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="850" y="980" font-family="Arial" font-size="12" text-anchor="middle">Load Cached Data</text>
  <text x="850" y="998" font-family="Arial" font-size="12" text-anchor="middle">+ Queue Changes</text>

  <rect x="510" y="1040" width="280" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="650" y="1070" font-family="Arial" font-size="12" text-anchor="middle">Use Features +</text>
  <text x="650" y="1088" font-family="Arial" font-size="12" text-anchor="middle">Notifications</text>

  <rect x="710" y="1040" width="280" height="60" rx="12" ry="12" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <text x="850" y="1070" font-family="Arial" font-size="12" text-anchor="middle">Use Features +</text>
  <text x="850" y="1088" font-family="Arial" font-size="12" text-anchor="middle">Notifications</text>

  <!-- Connectors -->
  <line x1="500" y1="100" x2="500" y2="130" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="190" x2="500" y2="220" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Authenticated? -> Login/Register (No) -->
  <polyline points="380,280 220,280 220,350" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="270" font-family="Arial" font-size="12">No</text>

  <!-- Authenticated? -> EULA (Yes) -->
  <line x1="500" y1="340" x2="500" y2="390" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="365" font-family="Arial" font-size="12">Yes</text>

  <!-- Login/Register -> EULA -->
  <polyline points="220,410 220,450 380,450" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- EULA No -> Login/Register -->
  <polyline points="380,450 180,450 180,350 220,350" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="440" font-family="Arial" font-size="12">No</text>

  <!-- EULA Yes -> Load Profile -->
  <line x1="500" y1="510" x2="500" y2="540" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="525" font-family="Arial" font-size="12">Yes</text>

  <!-- Load Profile -> Role -->
  <line x1="500" y1="600" x2="500" y2="610" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Role -> Admin -->
  <polyline points="380,670 250,670 250,740" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="660" font-family="Arial" font-size="12">Admin</text>

  <!-- Role -> Student -->
  <polyline points="620,670 750,670 750,740" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="660" font-family="Arial" font-size="12">Student</text>

  <!-- Admin -> Manage -->
  <line x1="250" y1="800" x2="250" y2="820" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Student -> Online -->
  <line x1="750" y1="800" x2="750" y2="820" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Online -> Sync (Yes) -->
  <polyline points="630,880 650,880 650,950" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="870" font-family="Arial" font-size="12">Yes</text>

  <!-- Online -> Cached (No) -->
  <polyline points="870,880 850,880 850,950" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="860" y="870" font-family="Arial" font-size="12">No</text>

  <!-- Sync -> Use Features -->
  <line x1="650" y1="1020" x2="650" y2="1040" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cached -> Use Features -->
  <line x1="850" y1="1020" x2="850" y2="1040" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
